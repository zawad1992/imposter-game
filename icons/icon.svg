<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Mask face / imposter emoji-style -->
  <!-- Head -->
  <circle cx="256" cy="210" r="110" fill="url(#glyph)" opacity="0.95"/>
  <!-- Eyes -->
  <ellipse cx="216" cy="190" rx="18" ry="22" fill="#0f172a"/>
  <ellipse cx="296" cy="190" rx="18" ry="22" fill="#0f172a"/>
  <!-- Eyebrows (angry) -->
  <line x1="196" y1="158" x2="238" y2="170" stroke="#0f172a" stroke-width="10" stroke-linecap="round"/>
  <line x1="316" y1="158" x2="274" y2="170" stroke="#0f172a" stroke-width="10" stroke-linecap="round"/>
  <!-- Smirk mouth -->
  <path d="M 210 248 Q 256 290 302 248" fill="none" stroke="#0f172a" stroke-width="10" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="256" cy="380" rx="80" ry="50" fill="url(#glyph)" opacity="0.9"/>
  <!-- Question mark / shadow detail -->
  <text x="256" y="475" text-anchor="middle" font-size="36" font-family="system-ui,sans-serif"
        font-weight="900" fill="rgba(255,255,255,0.5)">IMPOSTER</text>
</svg>
